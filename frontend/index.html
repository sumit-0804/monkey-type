<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turbo Type</title>
    <script>
      try {
        var t = localStorage.getItem('campus-type-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var customDark = ['monokai', 'dracula', 'terminal'];
        if (!t) t = prefersDark ? 'dark' : 'light';
        if (t === 'dark') {
          document.documentElement.classList.add('dark');
        } else if (t !== 'light') {
          // Custom dark theme: apply both classes
          document.documentElement.classList.add('dark', t);
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
